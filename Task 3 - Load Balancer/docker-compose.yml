version: "3.9"

services:
  loadbalancer:
    build: ./load_balancer
    image: ds-loadbalancer:latest
    container_name: loadbalancer
    ports:
      - "5000:5000"
    volumes:
      # Lets the load balancer talk to the host's Docker daemon so it
      # can spawn/remove server replicas as siblings on the same host.
      - /var/run/docker.sock:/var/run/docker.sock
    privileged: true
    networks:
      net1:
        aliases:
          - loadbalancer
    environment:
      SERVER_IMAGE: ds-server:latest
      NETWORK_NAME: net1
      INITIAL_N: "3"
      HEARTBEAT_INTERVAL: "5"

networks:
  net1:
    name: net1
    driver: bridge

# Note: the Task 1 server image is intentionally NOT declared as a
# compose service here. Its containers are spawned dynamically by the
# load balancer (with runtime-chosen hostnames) via the Docker socket,
# so it only needs to be *built*, not run directly by compose.
# `make build` builds it; `make up` starts only the load balancer,
# which then spawns the initial N replicas itself.
